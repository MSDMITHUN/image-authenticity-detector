<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Authenticity & Provenance Detector</title>
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #0b172a;
      --card: rgba(15, 23, 42, 0.78);
      --card-border: rgba(148, 163, 184, 0.16);
      --text: #e5eefb;
      --muted: #96a3b8;
      --accent: #60a5fa;
      --accent-2: #8b5cf6;
      --good: #34d399;
      --warn: #fbbf24;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 22px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.16), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, #081121 45%, #050b15 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: rgba(7, 17, 31, 0.72);
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .topbar-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
      font-size: 1rem;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 30px rgba(96, 165, 250, 0.25);
      font-size: 1.05rem;
    }

    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      padding: 8px 12px;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .nav a:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 24px 72px;
    }

    .hero {
      padding: 58px 0 24px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255, 255, 255, 0.03);
      color: #cfe3ff;
      font-size: 0.92rem;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 4vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.75;
      max-width: 62ch;
      margin: 18px 0 0;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: 0 18px 36px rgba(99, 102, 241, 0.26);
    }

    .btn-primary:hover { transform: translateY(-1px); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-color: rgba(148, 163, 184, 0.18);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .hero-panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 22px;
    }

    .hero-panel h3 {
      margin: 0 0 14px;
      font-size: 1.05rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat {
      padding: 16px;
      border-radius: 18px;
      background: rgba(8, 15, 27, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .stat .label {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.35;
    }

    .section {
      margin-top: 26px;
      padding-top: 18px;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title h2 {
      margin: 0;
      font-size: clamp(1.4rem, 2vw, 2rem);
      letter-spacing: -0.02em;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(14px);
    }

    .flow {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .step {
      padding: 18px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(148, 163, 184, 0.15);
      text-align: center;
    }

    .demo-frame {
      width: 100%;
      min-height: 760px;
      border-radius: 18px;
    }

    @media (max-width: 980px) {
      .hero, .grid-3, .flow { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<section class="section" id="demo">
  <div class="card">
    
    <!-- ✅ ONLY CHANGE: iframe updated -->
    <iframe 
      src="https://Mithunbjifdhk-authenticity-detector.hf.space"
      sandbox="allow-scripts allow-same-origin allow-forms"
      allowfullscreen
      class="demo-frame">
    </iframe>

  </div>
</section>

</body>
</html>
